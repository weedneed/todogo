<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TODOGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-36">

    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none max-w-xs w-full text-center py-2.5 px-4 rounded-2xl shadow-xl font-extrabold text-xs tracking-wide"></div>

    <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 px-4 py-3.5 flex justify-between items-center z-40 shadow-xs">
        <h1 class="text-xl font-black tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">
            TODOGO
        </h1>
        <div class="flex items-center bg-amber-50 border border-amber-200/80 px-3 py-1.5 rounded-full">
            <span class="text-sm mr-1">🪙</span>
            <span id="balance-display" class="font-black text-amber-600 text-base">...</span>
        </div>
    </header>

    <main id="view-tasks" class="max-w-md mx-auto px-4 mt-4 block">
        <div id="tasks-list" class="space-y-2.5"></div>
        
        <div class="h-32"></div>

        <div class="fixed bottom-16 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 p-3 z-30 shadow-lg">
            <form onsubmit="createTask(event)" class="max-w-md mx-auto flex flex-col gap-2">
                <div class="flex gap-2">
                    <input type="text" id="task-title" required placeholder="Что сделать?..." class="flex-grow bg-slate-100 border-none rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="number" id="task-reward" value="10" min="1" class="w-16 bg-amber-50 text-amber-700 font-black rounded-xl text-center text-sm focus:outline-none">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-black px-5 rounded-xl transition-all shadow-md">+</button>
                </div>
                <div class="flex items-center gap-2 px-1 py-0.5">
                    <input type="checkbox" id="task-is-habit" class="w-4 h-4 accent-indigo-600 rounded cursor-pointer">
                    <label for="task-is-habit" class="text-xs font-bold text-slate-500 select-none cursor-pointer">
                        🔄 Повторять каждый день (Привычка)
                    </label>
                </div>
            </form>
        </div>
    </main>

    <main id="view-shop" class="max-w-md mx-auto px-4 mt-4 hidden">
        <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 px-1">Витрина наград</h2>
        <div id="shop-list" class="space-y-3"></div>
    </main>

    <main id="view-admin" class="max-w-md mx-auto px-4 mt-4 hidden space-y-6">
        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
            <h2 class="text-xs font-black text-purple-600 uppercase tracking-wider mb-3">Создать новый товар</h2>
            <form onsubmit="createShopItem(event)" class="flex gap-2">
                <input type="text" id="shop-title" placeholder="Название награды..." required class="flex-grow bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm">
                <input type="number" id="shop-price" value="50" min="1" class="w-20 bg-purple-50 text-purple-700 font-bold rounded-xl text-center text-sm">
                <button type="submit" class="bg-purple-600 text-white font-black px-4 py-2.5 rounded-xl">+</button>
            </form>
        </div>
        <div>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 px-1">Управление товарами</h2>
            <div id="admin-shop-list" class="space-y-2"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200/80 h-16 flex justify-around items-center z-40 text-xs font-bold text-slate-400 select-none">
        <button onclick="switchTab('tasks')" id="tab-tasks" class="flex flex-col items-center w-1/3 py-1 text-indigo-600 font-black">
            <span class="text-lg mb-0.5">📝</span><span>Задачи</span>
        </button>
        <button onclick="switchTab('shop')" id="tab-shop" class="flex flex-col items-center w-1/3 py-1">
            <span class="text-lg mb-0.5">🛒</span><span>Магазин</span>
        </button>
        <button onclick="switchTab('admin')" id="tab-admin" class="flex flex-col items-center w-1/3 py-1">
            <span class="text-lg mb-0.5">⚙️</span><span>Админка</span>
        </button>
    </nav>

    <script>
        // ВНИМАНИЕ: В СТРОКЕ НИЖЕ ВСТАВЬ СВОЙ РЕАЛЬНЫЙ АДРЕС С RENDER.COM!
        const API = 'https://твоё-имя-сервиса.onrender.com';
        
        let currentTab = 'tasks';

        function switchTab(tab) {
            currentTab = tab;
            ['tasks', 'shop', 'admin'].forEach(t => {
                document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`tab-${t}`);
                btn.className = `flex flex-col items-center w-1/3 py-1 ${t === tab ? 'text-indigo-600 font-black' : 'text-slate-400'}`;
            });
            loadData();
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-16 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 max-w-xs w-full text-center py-2.5 px-4 rounded-2xl shadow-xl font-extrabold text-xs tracking-wide pointer-events-none ${
                type === 'success' ? 'bg-emerald-600 text-white' : 'bg-rose-500 text-white'
            }`;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        async function updateBalance() {
            try {
                let res = await fetch(`${API}/balance`);
                let data = await res.json();
                document.getElementById('balance-display').innerText = data.balance;
            } catch (e) { console.error(e); }
        }

        async function loadData() {
            updateBalance();
            if (currentTab === 'tasks') renderTasks();
            if (currentTab === 'shop') renderShop();
            if (currentTab === 'admin') renderAdmin();
        }

        async function renderTasks() {
            try {
                let res = await fetch(`${API}/tasks`);
                let tasks = await res.json();
                const list = document.getElementById('tasks-list');
                list.innerHTML = '';

                if (tasks.length === 0) {
                    list.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm font-medium">Список пуст. Добавь задачу внизу! 👇</div>';
                    return;
                }

                tasks.forEach(t => {
                    const div = document.createElement('div');
                    div.className = `p-3.5 rounded-2xl border transition-all flex items-center justify-between ${
                        t.is_completed ? 'bg-slate-100/80 border-slate-200/60 opacity-50' : 'bg-white border-slate-100 shadow-sm'
                    }`;
                    
                    div.innerHTML = `
                        <div class="flex items-center space-x-3 pr-2 overflow-hidden flex-grow cursor-pointer" onclick="toggleTask(${t.id})">
                            <div class="w-6 h-6 rounded-lg border-2 flex items-center justify-center flex-shrink-0 transition-colors ${
                                t.is_completed ? 'bg-emerald-500 border-emerald-500 text-white font-bold text-xs' : 'border-slate-300 bg-slate-50'
                            }">
                                ${t.is_completed ? '✓' : ''}
                            </div>
                            <div class="flex flex-col truncate flex-grow">
                                <span class="text-sm font-semibold ${t.is_completed ? 'line-through text-slate-400' : 'text-slate-700'} truncate">
                                    ${t.title}
                                </span>
                                ${t.is_habit ? '<span class="w-max mt-1 bg-purple-100 text-purple-700 font-extrabold text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wider">🔄 Ежедневно</span>' : ''}
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 flex-shrink-0">
                            <span class="text-xs font-black px-2 py-1 rounded-lg ${t.is_completed ? 'bg-slate-200 text-slate-500' : 'bg-amber-100 text-amber-700'}">
                                +${t.reward}
                            </span>
                            <button onclick="deleteTask(${t.id}, event)" class="text-slate-300 hover:text-rose-500 p-1 text-sm font-black transition-colors">✕</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        async function createTask(e) {
            e.preventDefault();
            const titleInput = document.getElementById('task-title');
            const rewardInput = document.getElementById('task-reward');
            const habitInput = document.getElementById('task-is-habit');

            const title = titleInput.value.trim();
            const reward = parseInt(rewardInput.value) || 10;
            const is_habit = habitInput.checked; // строго забираем true / false

            if (!title) return;

            try {
                await fetch(`${API}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, reward, is_habit })
                });

                titleInput.value = '';
                habitInput.checked = false;
                loadData();
            } catch (err) { console.error(err); }
        }

        async function toggleTask(id) {
            try {
                let res = await fetch(`${API}/tasks/${id}/toggle`, { method: 'POST' });
                let data = await res.json();
                document.getElementById('balance-display').innerText = data.current_balance;
                renderTasks();
            } catch (e) { console.error(e); }
        }

        async function deleteTask(id, event) {
            event.stopPropagation();
            if (!confirm("Точно удалить задачу?")) return;
            try {
                await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
                loadData();
            } catch (e) { console.error(e); }
        }

        async function renderShop() {
            try {
                let res = await fetch(`${API}/shop`);
                let items = await res.json();
                const list = document.getElementById('shop-list');
                list.innerHTML = '';

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between";
                    div.innerHTML = `
                        <div>
                            <div class="font-bold text-slate-800 text-sm">${item.title}</div>
                            <div class="text-xs text-amber-600 font-black mt-0.5">${item.price} 🪙</div>
                        </div>
                        <button onclick="buyItem(${item.id})" class="bg-amber-500 hover:bg-amber-600 active:scale-95 text-white text-xs font-black px-4 py-2 rounded-xl transition-all shadow-sm">Купить</button>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        async function buyItem(id) {
            try {
                let res = await fetch(`${API}/shop/${id}/buy`, { method: 'POST' });
                let data = await res.json();
                if (res.ok) {
                    document.getElementById('balance-display').innerText = data.new_balance;
                    showToast(`🎉 Куплено: ${data.bought}!`);
                } else { showToast(data.detail || "Не хватает монет!", "error"); }
            } catch (e) { console.error(e); }
        }

        async function renderAdmin() {
            try {
                let res = await fetch(`${API}/shop`);
                let items = await res.json();
                const list = document.getElementById('admin-shop-list');
                list.innerHTML = '';

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-3 bg-white rounded-xl border border-slate-100 flex items-center justify-between text-xs";
                    div.innerHTML = `
                        <span class="font-semibold text-slate-700">${item.title} <b class="text-amber-600">(${item.price} 🪙)</b></span>
                        <button onclick="deleteShopItem(${item.id})" class="text-rose-500 font-bold px-2 py-1">Удалить</button>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        async function createShopItem(e) {
            e.preventDefault();
            const titleInput = document.getElementById('shop-title');
            const priceInput = document.getElementById('shop-price');
            const title = titleInput.value.trim();
            const price = parseInt(priceInput.value) || 50;

            if (!title) return;
            await fetch(`${API}/shop`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, price }) });
            titleInput.value = '';
            renderAdmin();
        }

        async function deleteShopItem(id) { await fetch(`${API}/shop/${id}`, { method: 'DELETE' }); renderAdmin(); }

        window.addEventListener('focus', loadData);
        loadData();
    </script>
</body>
</html>
